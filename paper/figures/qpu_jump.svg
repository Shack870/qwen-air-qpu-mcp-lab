  <line class="axis" x1="86" y1="500" x2="1058" y2="500"/>
  <text class="small" text-anchor="middle" transform="translate(24 291.0) rotate(-90)">generation tokens/sec</text>
  <rect x="86.0" y="330.4" width="178.4" height="169.6" rx="4" fill="#2563eb"/>
